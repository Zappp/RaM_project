name: Supabase CI & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  supabase_build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Prepare Deno cache folder
        run: mkdir -p ~/.cache/deno

      - name: Cache Deno modules
        uses: actions/cache@v3
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('supabase/functions/deps.ts', 'supabase/functions/deno.json') }}
          restore-keys: deno-

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Prepare Supabase CLI folder
        run: mkdir -p ~/.supabase

      - name: Cache Supabase CLI
        uses: actions/cache@v3
        with:
          path: ~/.supabase
          key: supabase-cli-${{ hashFiles('supabase/functions/deno.json') }}
          restore-keys: supabase-cli-

      - name: Start Supabase local development setup
        run: supabase db start

      - name: Verify generated types are checked in
        run: |
          supabase gen types typescript --local > supabase/functions/_shared/types/database.types.ts
          if ! git diff --ignore-space-at-eol --exit-code --quiet supabase/functions/_shared/types/database.types.ts; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff
            exit 1
          fi

      - name: Check types
        run: deno check -c supabase/functions/deno.json --lock=supabase/functions/deno.lock supabase/functions

      - name: Format code
        run: deno fmt --check --unstable-sql supabase

      - name: Run migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref $PROJECT_REF
          supabase db push --yes

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          cd supabase/functions
          supabase link --project-ref $PROJECT_REF
          supabase functions deploy --no-verify-jwt --yes
