name: Supabase Backend Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          cd supabase
          supabase link --project-ref $PROJECT_REF
          supabase db push --yes
      
      - name: Check database types against functions 
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          cd supabase
          supabase gen types typescript --project-id $PROJECT_REF --schema public > /tmp/database.types.ts
          if ! diff -q /tmp/database.types.ts ./functions/_shared/types/database.types.ts > /dev/null; then
            echo "ERROR: Generated types differ from committed types. Please update _shared/types/database.types.ts"
            exit 1
          fi

      - name: Check functions types
        run: |
          cd supabase/functions
          deno task check

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          cd supabase/functions
          supabase link --project-ref $PROJECT_REF
          supabase functions deploy --no-verify-jwt --yes